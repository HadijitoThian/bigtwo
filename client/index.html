<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Big Two — Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Two">
<link rel="apple-touch-icon" href="/img/icon-192.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body class="has-bg">

<!-- LOBBY SCREEN -->
<div id="lobby-screen">
  <div class="lobby-container">
    <h1><span class="spade-icon">🂡</span> Big Two</h1>
    <p class="tagline">Online multiplayer</p>
    <button id="sound-toggle-btn-lobby" class="icon-btn" style="margin-bottom:12px" onclick="window.toggleSound?.()">🔊</button>
    <button id="music-toggle-btn-lobby" class="icon-btn" style="margin-bottom:12px;margin-left:4px" onclick="window.toggleMusic?.()" title="Background music">🎵</button>

    <div id="join-section">
      <input type="text" id="playerName" placeholder="Your name" maxlength="20">
      <div class="lobby-buttons">
        <button id="createRoomBtn">Create Room</button>
        <div class="join-row">
          <input type="text" id="roomCode" placeholder="CODE" maxlength="4" style="text-transform:uppercase">
          <button id="joinRoomBtn">Join</button>
        </div>
      </div>
      <button id="profile-settings-btn" class="profile-btn" title="Profile Settings">⚙ Profile</button>
    </div>

    <div id="room-lobby" class="hidden">
      <h2>Room: <span id="displayCode" class="room-code"></span> <button id="copyCodeBtn" class="copy-btn" title="Copy code">📋</button></h2>
      <p class="share-hint">Share this code with your friends</p>
      <div id="playerList"></div>
      <div id="lobby-error" style="color:#ff8a80;font-size:13px;min-height:18px;margin:8px 0;"></div>
      <div id="host-controls" class="hidden">
        <div class="match-config">
          <select id="totalRounds">
            <option value="12" selected>12 Rounds</option>
            <option value="16">16 Rounds</option>
            <option value="18">18 Rounds</option>
          </select>
          <select id="bet">
            <option value="5000">5K / pt</option>
            <option value="10000" selected>10K / pt</option>
            <option value="20000">20K / pt</option>
            <option value="30000">30K / pt</option>
            <option value="50000">50K / pt</option>
          </select>
        </div>
        <button id="startMatchBtn">Start Match</button>
      </div>
      <p id="waiting-host" class="hidden">Waiting for host to start...</p>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="hidden">
  <div id="game-main">
  <header>
    <h1>🂡 <span id="game-room-code"></span></h1>
    <div id="header-buttons">
      <button id="sound-toggle-btn" class="icon-btn" onclick="window.toggleSound?.()">🔊</button>
      <button id="reconnect-btn" class="icon-btn" title="Reconnect">🔄</button>
    </div>
    <div id="match-info-bar">
      <div id="round-indicator">Round 1 / 12</div>
      <div id="cumulative-scores"></div>
    </div>
  </header>

  <div id="opponents"></div>

  <div id="table-area">
    <div id="turn-indicator">—</div>
    <div id="timer-container">
      <div id="timer-bar"></div>
      <span id="timer-text"></span>
    </div>
    <div id="last-card-alert" class="hidden">⚠️ <span id="last-card-text"></span></div>
    <div id="table-play">
      <div class="label">Table Play</div>
      <div id="table-cards" class="cards-row"></div>
      <div id="table-type"></div>
    </div>
    <div id="actions">
      <button id="playBtn" disabled>Play Selected</button>
      <button id="passBtn" disabled>Pass</button>
      <button id="hintBtn" disabled>Hint</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <div id="my-hand-area">
    <div class="my-hand-header">
      <span id="my-name"></span>
      <span id="my-card-count"></span>
    </div>
    <div id="my-hand" class="cards-row"></div>
  </div>

  <div id="stop-match-container">
    <button id="stopMatchBtn">Stop Match</button>
  </div>
  </div><!-- /game-main -->

  <!-- Chat -->
  <div id="chat-sidebar">
    <div id="chat-header">
      <span>Chat</span>
      <button class="close-chat" id="chat-close-btn">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Type a message..." maxlength="300">
      <button id="chat-send-btn">Send</button>
    </div>
  </div>
  <button id="chat-toggle-btn" title="Open chat">💬</button>
</div>

<!-- ROUND END MODAL -->
<div id="round-end-modal" class="hidden">
  <div class="modal-content">
    <h2>🏆 Round <span id="round-end-num"></span> Complete</h2>
    <div id="round-end-body"></div>
    <div class="modal-actions">
      <button id="nextRoundBtn">Next Round →</button>
      <button id="stopMatchBtn2" class="secondary">Stop Match</button>
    </div>
  </div>
</div>

<!-- MATCH END MODAL -->
<div id="match-end-modal" class="hidden">
  <div class="modal-content">
    <h2>🏁 Match Complete</h2>
    <div id="match-end-body"></div>
    <button id="closeMatchEnd">Close</button>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profile-modal" class="hidden">
  <div class="modal-content profile-modal">
    <h2>Profile Settings</h2>
    <div class="profile-preview">
      <img id="profile-avatar-preview" src="" alt="avatar" width="80" height="80">
      <div>
        <input type="text" id="profile-name-field" placeholder="Name" maxlength="20">
        <p class="profile-hint">Your name and avatar stay saved across sessions</p>
      </div>
    </div>
    <div class="profile-styles">
      <label>Avatar Style:</label>
      <div id="avatar-style-grid"></div>
    </div>
    <button id="save-profile-btn">Save Profile</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      console.log('SW registered:', reg.scope);
    }).catch((err) => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
